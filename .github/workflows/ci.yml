name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build & test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # vk.xml is downloaded automatically via the fetch-spec feature on CI
      # so we don't need to vendor a copy of the spec.
      - name: Build (default features)
        run: cargo build -p spock --features fetch-spec

      - name: Build (no default features)
        run: cargo build -p spock --features fetch-spec --no-default-features

      - name: Run unit tests
        # The real-Vulkan integration test gracefully skips when no driver
        # is installed (CI runners don't have GPU drivers), so this is safe
        # to run on all platforms.
        run: cargo test --workspace --features fetch-spec

      - name: Build example
        run: cargo build -p spock --features fetch-spec --example device_info

  format:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Clippy is informational for now; the build job already enforces no
      # compiler warnings. Cleanup of clippy lints is tracked separately.
      - name: Run clippy
        run: cargo clippy -p spock --features fetch-spec || true
